name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: maven
    - name: Install JavaFX SDK
      run: |
        mkdir -p ~/.javafx
        cd ~/.javafx
        curl -L https://download2.gluonhq.com/openjfx/21/openjfx-21_linux-x64_bin-sdk.zip -o javafx.zip
        unzip javafx.zip
        echo "JAVA_FX_HOME=$HOME/.javafx/javafx-sdk-21" >> $GITHUB_ENV
        echo "PATH=$JAVA_FX_HOME/bin:$PATH" >> $GITHUB_ENV
    - name: Compile with Maven
      run: mvn -B compile --file pom.xml

  test:
    name: Tests & Code Coverage
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: maven
    - name: Install JavaFX SDK
      run: |
        mkdir -p ~/.javafx
        cd ~/.javafx
        curl -L https://download2.gluonhq.com/openjfx/21/openjfx-21_linux-x64_bin-sdk.zip -o javafx.zip
        unzip javafx.zip
        echo "JAVA_FX_HOME=$HOME/.javafx/javafx-sdk-21" >> $GITHUB_ENV
        echo "PATH=$JAVA_FX_HOME/bin:$PATH" >> $GITHUB_ENV
    - name: Run tests with JaCoCo coverage
      run: mvn -B test jacoco:check --file pom.xml -Dpitest.skip=true
    - name: Upload code coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage-report
        path: target/site/jacoco/

  mutation:
    name: Mutation Testing (PITest)
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: maven
    - name: Install JavaFX SDK
      run: |
        mkdir -p ~/.javafx
        cd ~/.javafx
        curl -L https://download2.gluonhq.com/openjfx/21/openjfx-21_linux-x64_bin-sdk.zip -o javafx.zip
        unzip javafx.zip
        echo "JAVA_FX_HOME=$HOME/.javafx/javafx-sdk-21" >> $GITHUB_ENV
        echo "PATH=$JAVA_FX_HOME/bin:$PATH" >> $GITHUB_ENV
    - name: Run mutation testing
      run: mvn -B test-compile org.pitest:pitest-maven:mutationCoverage --file pom.xml -Djacoco.skip=true
    - name: Upload mutation coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pitest-mutation-report
        path: target/pit-reports/

  static-analysis:
    name: Static Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: maven
    - name: Install JavaFX SDK
      run: |
        mkdir -p ~/.javafx
        cd ~/.javafx
        curl -L https://download2.gluonhq.com/openjfx/21/openjfx-21_linux-x64_bin-sdk.zip -o javafx.zip
        unzip javafx.zip
        echo "JAVA_FX_HOME=$HOME/.javafx/javafx-sdk-21" >> $GITHUB_ENV
        echo "PATH=$JAVA_FX_HOME/bin:$PATH" >> $GITHUB_ENV
    - name: Run SpotBugs
      run: mvn -B compile spotbugs:check --file pom.xml
    - name: Run PMD
      run: mvn -B compile pmd:check --file pom.xml
    - name: Run Checkstyle
      run: mvn -B compile checkstyle:check --file pom.xml
    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: target/spotbugsXml.xml
    - name: Upload PMD report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pmd-report
        path: target/pmd.xml
